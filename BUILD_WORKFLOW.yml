# This file is the GitHub Actions workflow.
# It must live at: .github/workflows/build.yml
# Rename this file in GitHub UI (Edit -> change name to ".github/workflows/build.yml" -> Commit).
# (The leading dot is required.)

name: Build APK and IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.0
          cache: true
      - name: Bootstrap if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android,ios --project-name=kenji_dns --org com.kenji .
          fi
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: kenji-dns-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.0
          cache: true
      - name: Bootstrap if missing
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=android,ios --project-name=kenji_dns --org com.kenji .
          fi
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr kenji-dns-ios-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: kenji-dns-ios-unsigned-ipa
          path: build/ios/iphoneos/kenji-dns-ios-unsigned.ipa
  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: kenji-dns-android-apk
          path: ./artifacts
      - uses: actions/download-artifact@v4
        with:
          name: kenji-dns-ios-unsigned-ipa
          path: ./artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Automated build from ${{ github.sha }}.
          files: |
            artifacts/app-release.apk
            artifacts/kenji-dns-ios-unsigned.ipa
          fail_on_unmatched_files: false
